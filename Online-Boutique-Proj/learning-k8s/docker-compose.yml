version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: learning-k8s-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: boutique_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/seed-data.sql:/docker-entrypoint-initdb.d/02-seed-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - learning-k8s-net

  product-catalog:
    build:
      context: ./services/product-catalog
      dockerfile: Dockerfile
    container_name: learning-k8s-product-catalog
    environment:
      PORT: 3550
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: boutique_db
    ports:
      - "3550:3550"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - learning-k8s-net

  cart-service:
    build:
      context: ./services/cart/src
      dockerfile: Dockerfile
    container_name: learning-k8s-cart
    environment:
      ASPNETCORE_URLS: http://+:7070
      ConnectionStrings__DefaultConnection: "Server=postgres;Port=5432;Database=boutique_db;User Id=postgres;Password=postgres;"
    ports:
      - "7070:7070"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - learning-k8s-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: learning-k8s-frontend
    environment:
      PORT: 8080
      PRODUCT_CATALOG_SERVICE_ADDR: product-catalog:3550
      CART_SERVICE_ADDR: cart-service:7070
      # Removed env vars for missing services to avoid mustMapEnv panics
    ports:
      - "8080:8080"
    depends_on:
      - product-catalog
      - cart-service
    networks:
      - learning-k8s-net

  # Dummy services to satisfy DNS lookups (prevents "no such host" errors)
  currency-service:
    image: alpine:latest
    command: ["sh", "-c", "while true; do sleep 1; done"]
    ports:
      - "7000:7000"
    networks:
      - learning-k8s-net

  recommendation-service:
    image: alpine:latest
    command: ["sh", "-c", "while true; do sleep 1; done"]
    ports:
      - "8081:8081"
    networks:
      - learning-k8s-net

  checkout-service:
    image: alpine:latest
    command: ["sh", "-c", "while true; do sleep 1; done"]
    ports:
      - "5050:5050"
    networks:
      - learning-k8s-net

  shipping-service:
    image: alpine:latest
    command: ["sh", "-c", "while true; do sleep 1; done"]
    ports:
      - "50051:50051"
    networks:
      - learning-k8s-net

  ad-service:
    image: alpine:latest
    command: ["sh", "-c", "while true; do sleep 1; done"]
    ports:
      - "9555:9555"
    networks:
      - learning-k8s-net

  shopping-assistant:
    image: alpine:latest
    command: ["sh", "-c", "while true; do sleep 1; done"]
    ports:
      - "8081:8080"  # Avoid conflict with frontend
    networks:
      - learning-k8s-net

volumes:
  postgres_data:

networks:
  learning-k8s-net:
    driver: bridge
